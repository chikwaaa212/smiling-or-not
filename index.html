<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smile Detection System</title>

<script defer src="https://unpkg.com/face-api.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#dbeafe,#eff6ff);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    background:white;
    width:380px;
    padding:30px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

h1{
    color:#1e3a8a;
    margin-bottom:10px;
}

p{
    color:#555;
    font-size:14px;
    margin-bottom:20px;
}

.upload-box{
    border:2px dashed #3b82f6;
    padding:20px;
    border-radius:15px;
    display:block;
    cursor:pointer;
    color:#2563eb;
    margin:20px 0;
    transition:0.3s;
}

.upload-box:hover{
    background:#eff6ff;
}

#imageInput{
    display:none;
}

#preview{
    width:100%;
    max-height:280px;
    object-fit:cover;
    border-radius:15px;
    display:none;
    margin-bottom:15px;
}

button{
    width:100%;
    padding:13px;
    border:none;
    border-radius:12px;
    background:#2563eb;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#1d4ed8;
}

#result{
    margin-top:18px;
    font-size:20px;
    font-weight:bold;
}

.loading{
    color:#777;
    font-size:13px;
    margin-bottom:15px;
}

</style>
</head>

<body>

<div class="container">

    <h1>Smile Detection System</h1>

    <p>
        Upload a face image and detect if the person is smiling or not.
    </p>

    <div id="status" class="loading">
        Preparing Smile Detection...
    </div>

    <label class="upload-box">

        Click to Upload Image

        <input
            type="file"
            id="imageInput"
            accept="image/*"
        >

    </label>

    <img id="preview">

    <button type="button" id="detectBtn">
        Detect Smile
    </button>

    <div id="result"></div>

</div>

<script>

const imageInput =
document.getElementById("imageInput");

const preview =
document.getElementById("preview");

const detectBtn =
document.getElementById("detectBtn");

const result =
document.getElementById("result");

const statusText =
document.getElementById("status");

let imageLoaded = false;

window.onload = async function () {

    await faceapi.nets.tinyFaceDetector.loadFromUri(
    "https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/"
    );

    await faceapi.nets.faceLandmark68Net.loadFromUri(
    "https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/"
    );

    statusText.innerHTML =
    "AI model ready ✅";

};

imageInput.addEventListener("change", function () {

    const file = this.files[0];

    if(file){

        preview.src =
        URL.createObjectURL(file);

        preview.style.display =
        "block";

        result.innerHTML = "";

        imageLoaded = true;
    }

});

detectBtn.addEventListener("click", async function () {

    if(!imageLoaded){

        result.innerHTML =
        "Please upload an image first.";

        return;
    }

    result.innerHTML =
    "Analyzing image...";

    const detection =
    await faceapi
    .detectSingleFace(
        preview,
        new faceapi.TinyFaceDetectorOptions()
    )
    .withFaceLandmarks();

    if(!detection){

        result.innerHTML =
        "No face detected.";

        result.style.color =
        "#dc2626";

        return;
    }

    const mouth =
    detection.landmarks.getMouth();

    const leftMouth = mouth[0];
    const rightMouth = mouth[6];
    const topLip = mouth[13];
    const bottomLip = mouth[19];

    const mouthWidth =
    Math.abs(rightMouth.x - leftMouth.x);

    const mouthHeight =
    Math.abs(bottomLip.y - topLip.y);

    const smileRatio =
    mouthWidth / mouthHeight;

    if(smileRatio > 3.2){

        result.innerHTML =
        "Prediction: Smiling 😊";

        result.style.color =
        "#16a34a";

    }

    else{

        result.innerHTML =
        "Prediction: Not Smiling 😐";

        result.style.color =
        "#dc2626";

    }

});

</script>

</body>
</html>
