<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Smile Detection System</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>

<div class="container">
    <h1>Smile Detection System</h1>
    <p>Upload a face image to detect if the person is smiling or not.</p>

    <label class="upload-box">
        <input type="file" id="imageInput" accept="image/*" hidden />
        <span>Click to upload image</span>
    </label>

    <img id="preview" class="preview" style="display:none;" />

    <button id="detectBtn">Upload Image</button>

    <div id="result" class="result-box"></div>
</div>

<script>
const imageInput = document.getElementById("imageInput");
const preview = document.getElementById("preview");
const result = document.getElementById("result");

imageInput.addEventListener("change", function () {

    const file = this.files[0];

    if (file) {

        const reader = new FileReader();

        reader.onload = function(e) {
            preview.src = e.target.result;
            preview.style.display = "block";

            result.innerHTML = "Image uploaded successfully!";
        };

        reader.readAsDataURL(file);
    }
});
</script>

</body>
</html>
