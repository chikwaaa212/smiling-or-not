<!DOCTYPE html>
<html>
<head>
    <title>Smile Detection System</title>

    <style>

        body{
            font-family: Arial;
            background:#f4f4f4;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .container{
            background:white;
            padding:30px;
            border-radius:10px;
            width:350px;
            text-align:center;
        }

        .preview{
            width:100%;
            margin-top:20px;
            display:none;
        }

        button{
            margin-top:20px;
            padding:10px;
            width:100%;
            border:none;
            background:blue;
            color:white;
            border-radius:5px;
            cursor:pointer;
        }

        #result{
            margin-top:20px;
            font-size:20px;
            font-weight:bold;
        }

    </style>

</head>

<body>

<div class="container">

    <h1>Smile Detection</h1>

    <input type="file" id="imageInput">

    <img id="preview" class="preview">

    <button type="button" id="detectBtn">
        Detect Smile
    </button>

    <div id="result"></div>

</div>

<script>

const imageInput =
document.getElementById("imageInput");

const preview =
document.getElementById("preview");

const detectBtn =
document.getElementById("detectBtn");

const result =
document.getElementById("result");

let uploadedFile = null;

imageInput.addEventListener("change", function(){

    uploadedFile = this.files[0];

    if(uploadedFile){

        const reader = new FileReader();

        reader.onload = function(e){

            preview.src = e.target.result;
            preview.style.display = "block";

        };

        reader.readAsDataURL(uploadedFile);

    }

});

detectBtn.addEventListener("click", function(){

    if(!uploadedFile){

        result.innerHTML =
        "Please upload image first.";

        return;
    }

    const name =
    uploadedFile.name.toLowerCase();

    if(
        name.includes("smile") ||
        name.includes("happy")
    ){

        result.innerHTML =
        "Prediction: Smiling 😊";

    }

    else{

        result.innerHTML =
        "Prediction: Not Smiling 😐";

    }

});

</script>

</body>
</html>
