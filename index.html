<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smile Detection System</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="container">
    <h1>Smile Detection System</h1>
    <p>Upload a face image to detect if the person is smiling or not.</p>

    <label class="upload-box">
      <input type="file" id="imageInput" accept="image/*" required />
      <span>Click to upload image</span>
    </label>

    <img id="preview" class="preview" alt="Image preview" />
    <button id="detectBtn">Upload Image</button>
    <div id="result" class="result-box hidden"></div>
  </div>

<script>
const input = document.querySelector('input[type="file"]');

input.addEventListener('change', function () {
    const file = this.files[0];

    if (file) {
        alert("Image uploaded successfully!");
    }
});
</script>
